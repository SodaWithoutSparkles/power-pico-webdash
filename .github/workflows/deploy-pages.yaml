name: Deploy Static Content to Pages

on:
  push:
    branches: ["deploy"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Verify Bun version
        run: bun -v

      - name: Install dependencies
        run: bun install

      - name: Set build time
        run: |
          # record build time in ISO 8601 (UTC)
          echo "VITE_BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV
          echo "VITE_BUILD_COMMIT=${{ github.sha }}" >> $GITHUB_ENV
      
      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run:  bun run build
        env:
          VITE_BUILD_COMMIT: ${{ env.VITE_BUILD_COMMIT }}
          VITE_BUILD_TIME: ${{ env.VITE_BUILD_TIME }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4